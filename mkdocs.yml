site_name: Foundation Protocol (FP) Python SDK
site_description: Foundation Protocol reference runtime and SDK documentation
repo_name: foundation-protocol
docs_dir: docs/site
site_dir: site
theme:
  name: material
  language: en
  features:
    - navigation.sections
    - content.code.copy
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - src
          options:
            show_source: false
            heading_level: 2
            members_order: source
            separate_signature: true
            show_signature_annotations: true
markdown_extensions:
  - admonition
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - toc:
      permalink: true
extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - javascripts/mermaid-init.js
strict: true
nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture: architecture.md
  - Example: examples.md
  - API Reference: api.md
